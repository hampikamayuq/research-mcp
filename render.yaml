services:
  - type: web
    name: research-mcp
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: PUBMED_EMAIL
        value: your-email@domain.com
      - key: PUBMED_API_KEY
        sync: false
      - key: SEMANTIC_SCHOLAR_API_KEY
        sync: false
